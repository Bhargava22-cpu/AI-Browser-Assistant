<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Form Filling Test Fixture — Main Form</title>
</head>
<body>
<h1>Internship Application</h1>

<form id="application-form">
  <div>
    <label for="full-name">Full Name</label>
    <input type="text" id="full-name" name="full-name" />
  </div>

  <div>
    <label for="email-address">Email Address</label>
    <input type="email" id="email-address" name="email-address" />
  </div>

  <div>
    <input type="text" name="phone" aria-label="Phone Number" />
  </div>

  <div>
    <input type="text" name="skills" placeholder="Your skills, comma separated" />
  </div>

  <div>
    <label for="state-select">State</label>
    <select id="state-select" name="state">
      <option value="">-- select --</option>
      <option value="MH">Maharashtra</option>
      <option value="KA">Karnataka</option>
      <option value="TS">Telangana</option>
    </select>
  </div>

  <div>
    <input type="checkbox" id="newsletter" name="newsletter" />
    <label for="newsletter">Subscribe to newsletter</label>
  </div>

  <div>
    <input type="radio" id="gender-male" name="gender" value="Male" />
    <label for="gender-male">Male</label>
    <input type="radio" id="gender-female" name="gender" value="Female" />
    <label for="gender-female">Female</label>
  </div>

  <div>
    <label for="resume-upload">Resume</label>
    <input type="file" id="resume-upload" name="resume" />
  </div>

  <div>
    <label for="sop">Statement of Purpose — Why do you want this internship?</label>
    <textarea id="sop" name="sop"></textarea>
  </div>

  <div>
    <label for="referral-code">Referral Code</label>
    <input type="text" id="referral-code" name="referral-code" disabled />
  </div>

  <iframe id="extra-questions" src="nested_form.html" width="600" height="300"></iframe>

  <button type="submit" id="submit-btn">Submit Application</button>
</form>
</body>
</html>
