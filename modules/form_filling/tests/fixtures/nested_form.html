<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Form Filling Test Fixture — Nested Form</title>
</head>
<body>
<form id="extra-form">
  <div>
    <label for="referral-source">How did you hear about us?</label>
    <input type="text" id="referral-source" name="referral-source" />
  </div>

  <div>
    <label for="cover-letter">Cover Letter</label>
    <textarea id="cover-letter" name="cover-letter"></textarea>
  </div>
</form>
</body>
</html>
